<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Favicon (PowerSmith sunburst mark) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Apply the saved (or system) theme before first paint so there's no
         flash of the wrong theme. ThemeToggle keeps this in sync afterwards. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ps-theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <title>PowerSmith Energy — Solar Panels, Batteries & EV Chargers | San Diego</title>
    <meta
      name="description"
      content="Veteran-owned solar company. Complete solutions for solar panels, EV chargers and batteries with 30-year warranty. Save up to $50,000 on electricity over 25 years."
    />
    <meta property="og:title" content="PowerSmith Energy — Power Your Home. Own Your Energy." />
    <meta
      property="og:description"
      content="Veteran-owned solar, battery and EV charging solutions. Get a free quote today."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Nunito+Sans:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  </body>
</html>
